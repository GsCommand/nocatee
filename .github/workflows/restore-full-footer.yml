name: Restore full footer

on:
  push:
    branches:
      - restore-full-footer

permissions:
  contents: write

jobs:
  restore-footer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: restore-full-footer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore full footer on all HTML pages
        run: python scripts/restore_full_footer.py
      - name: Validate footer content
        run: |
          python - <<'PY'
          from pathlib import Path
          required = [
              'Driveway Paver Sealing',
              'Pool Deck Sealing',
              'Travertine Sealing',
              'House Washing',
              'Roof Washing',
              'Cost Calculator',
              '&copy; 2026 HydroSeal',
              'Serving Nocatee, Ponte Vedra &amp; St. Johns County, FL',
          ]
          checked = 0
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              if 'class="site-footer"' not in text:
                  continue
              checked += 1
              missing = [item for item in required if item not in text]
              if missing:
                  raise SystemExit(f'{path}: missing {missing}')
          if not checked:
              raise SystemExit('No HTML pages with site-footer found')
          print(f'Validated {checked} footer(s)')
          PY
      - name: Commit restored footers
        run: |
          if git diff --quiet; then
            echo "No footer changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git commit -m "Restore full service navigation footer on all pages"
          git push origin restore-full-footer
