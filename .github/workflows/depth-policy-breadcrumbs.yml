name: Depth policy breadcrumbs
on:
  push:
    branches: [depth-breadcrumb-policy-pass]
    paths: ['.github/workflows/depth-policy-breadcrumbs.yml']
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: depth-breadcrumb-policy-pass
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/depth_policy_breadcrumbs.py
      - name: Validate output
        run: |
          test -f nocatee-paver-joint-sand.html
          grep -q 'Polymeric sand in Florida: the honest answer' nocatee-paver-joint-sand.html
          grep -q 'Warranty claim process' warranty.html
          grep -q 'Information collected automatically' privacy-policy.html
          grep -q 'When driveway sealing should wait' nocatee-driveway-paver-sealing.html
          grep -q 'Pool-deck sealing should account for water, shade and traction' nocatee-pool-deck-paver-sealing.html
          for f in nocatee-driveway-paver-sealing.html nocatee-pool-deck-paver-sealing.html nocatee-travertine-sealing.html nocatee-house-washing.html nocatee-roof-washing.html paver-sealing-cost-calculator.html privacy-policy.html warranty.html nocatee-paver-joint-sand.html; do
            grep -q 'class="breadcrumb"' "$f"
            ! grep -q 'class="breadcrumbs"' "$f"
          done
          ! grep -q '<style>' nocatee-paver-joint-sand.html
          git diff --check
      - name: Remove one-time files and commit
        run: |
          rm -f scripts/depth_policy_breadcrumbs.py .github/workflows/depth-policy-breadcrumbs.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Expand joint sand, service depth and policy pages'
          git push origin depth-breadcrumb-policy-pass
