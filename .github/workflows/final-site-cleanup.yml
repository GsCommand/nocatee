name: Final site cleanup

on:
  push:
    branches:
      - complete-seo-content-cleanup
    paths:
      - '.github/workflows/final-site-cleanup.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: complete-seo-content-cleanup
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply final cleanup
        run: python scripts/final_site_cleanup.py
      - name: Validate
        run: |
          ! grep -n 'addressLocality' index.html
          test -f privacy-policy.html
          test -f warranty.html
          test -f nocatee-paver-joint-sand.html
          grep -q 'Nocatee Paver Joint Sand Replacement' nocatee-paver-joint-sand.html
          grep -q 'A planning tool, not a duplicate price list' paver-sealing-cost-calculator.html
          grep -q 'Why soft washing is used instead of high pressure' nocatee-roof-washing.html
          for f in index.html nocatee-driveway-paver-sealing.html nocatee-pool-deck-paver-sealing.html nocatee-travertine-sealing.html nocatee-house-washing.html; do
            ! grep -q '<style>' "$f"
          done
          for f in nocatee-driveway-paver-sealing.html nocatee-pool-deck-paver-sealing.html nocatee-travertine-sealing.html nocatee-house-washing.html nocatee-roof-washing.html paver-sealing-cost-calculator.html privacy-policy.html warranty.html nocatee-paver-joint-sand.html; do
            grep -q 'class="breadcrumbs"' "$f"
          done
          git diff --check
      - name: Remove one-time files and commit
        run: |
          rm -f scripts/final_site_cleanup.py
          rm -f .github/workflows/final-site-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete SEO content and policy cleanup"
          git push origin complete-seo-content-cleanup
