name: Scope warranty and certification badges

on:
  push:
    branches:
      - scope-warranty-certification-badges
    paths:
      - '.github/workflows/scope-badges.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scope-warranty-certification-badges
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply badge scoping
        run: python scripts/scope_badges.py
      - name: Validate scope
        run: |
          for f in nocatee-house-washing.html nocatee-roof-washing.html; do
            ! grep -q 'hydroseal-2-year-warranty.png' "$f"
            ! grep -q 'Trident-Master.jpg' "$f"
            grep -q 'do not apply to exterior-cleaning services' "$f"
            grep -q 'hydroseal-licensed-insured.png' "$f"
          done
          grep -q 'Two-year warranty applies to qualifying paver sealing projects.' index.html
          grep -q 'HydroSeal 2-Year Paver Sealing Warranty' index.html
          grep -q 'House washing, roof washing and other exterior-cleaning services are not covered by this warranty.' warranty.html
          grep -q '.cert-scope' styles.css
          git diff --check
      - name: Remove one-time files and commit
        run: |
          rm -f scripts/scope_badges.py
          rm -f .github/workflows/scope-badges.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Scope warranty and certification claims by service"
          git push origin scope-warranty-certification-badges
