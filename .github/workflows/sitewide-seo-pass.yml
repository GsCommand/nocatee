name: Sitewide SEO remediation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sitewide-seo-pass.yml'

permissions:
  contents: write

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install image tools
        run: pip install pillow
      - name: Compress pool-deck hero
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          src = Path('resealed-pavers.jpg')
          if src.exists():
              with Image.open(src) as im:
                  im.thumbnail((1600, 1600))
                  im.save('resealed-pavers.webp', 'WEBP', quality=74, method=6)
          PY
      - name: Apply SEO changes
        run: python scripts/sitewide_seo_pass.py
      - name: Remove replaced image and one-time automation
        run: |
          rm -f resealed-pavers.jpg
          rm -f scripts/sitewide_seo_pass.py
          rm -f .github/workflows/sitewide-seo-pass.yml
      - name: Validate
        run: |
          ! grep -R '<h1[^>]*>.*<br' --include='*.html' .
          ! grep -R 'outletdirect229@gmail.com' --include='*.html' .
          test -f resealed-pavers.webp
          grep -q 'FAQPage' nocatee-pool-deck-paver-sealing.html
          grep -q 'FAQPage' nocatee-travertine-sealing.html
          grep -q 'FAQPage' nocatee-house-washing.html
          grep -q 'FAQPage' nocatee-roof-washing.html
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete sitewide schema, performance and cleanup pass'
          git push origin main
